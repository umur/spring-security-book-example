spring:
  datasource:
    url: jdbc:h2:mem:cinetrack-acl-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:acl-schema.sql
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
