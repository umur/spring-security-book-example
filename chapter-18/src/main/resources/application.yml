spring:
  application:
    name: cinetrack-ch18
  datasource:
    url: jdbc:h2:mem:cinetrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:acl-schema.sql
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

server:
  port: 8080
