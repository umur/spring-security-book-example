spring:
  application:
    name: cinetrack-ch12
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      client:
        registration:
          # catalog-cc: client credentials registration used by RecommendationController
          catalog-cc:
            client-id: recommendation-service
            client-secret: secret
            authorization-grant-type: client_credentials
            scope: catalog:read
            provider: cinetrack-as
          # cinetrack-login: authorization code registration for end-user OAuth2 login
          cinetrack-login:
            client-id: recommendation-web
            client-secret: web-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
            provider: cinetrack-as
        provider:
          cinetrack-as:
            token-uri: http://localhost:9000/oauth2/token
            authorization-uri: http://localhost:9000/oauth2/authorize
            user-info-uri: http://localhost:9000/userinfo
            jwk-set-uri: http://localhost:9000/oauth2/jwks
            user-name-attribute: sub

server:
  port: 8080

cinetrack:
  catalog:
    base-url: http://localhost:8081
