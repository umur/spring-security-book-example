<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard — Spring Session Redis</title>
</head>
<body>
<h1>Dashboard</h1>
<p>Welcome, <strong th:text="${info.username}">user</strong>!</p>
<h2>Session Information (backed by Redis)</h2>
<ul>
    <li>Session ID: <span th:text="${info.sessionId}">-</span></li>
    <li>Created: <span th:text="${info.creationTime}">-</span></li>
    <li>Max Inactive (s): <span th:text="${info.maxInactiveInterval}">-</span></li>
    <li>Roles: <span th:text="${info.roles}">-</span></li>
</ul>
<form method="post" th:action="@{/logout}">
    <button type="submit">Logout</button>
</form>
</body>
</html>
