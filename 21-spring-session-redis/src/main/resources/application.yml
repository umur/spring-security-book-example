server:
  port: 8101

spring:
  application:
    name: spring-session-redis-example
  datasource:
    url: jdbc:h2:mem:redissession
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: spring:session:redis-example
      flush-mode: on-save
