server:
  port: 8085

spring:
  application:
    name: oauth2-resource-server-example
  datasource:
    url: jdbc:h2:mem:resourceserver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Overridden in tests with WireMock or local JWK set
          jwk-set-uri: http://localhost:9000/oauth2/jwks
