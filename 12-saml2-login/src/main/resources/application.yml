server:
  port: 8092

spring:
  application:
    name: saml2-login-example

  security:
    saml2:
      relyingparty:
        registration:
          # Registration ID — appears in the SSO URL: /saml2/authenticate/mock-idp
          mock-idp:
            entity-id: "http://localhost:8092/saml2/service-provider-metadata/mock-idp"
            # Assertion Consumer Service URL — where the IdP posts the SAML response
            acs:
              location: "http://localhost:8092/login/saml2/sso/mock-idp"
            # Self-signed keypair used for SP signing and (optionally) encryption.
            # Generated with: keytool -genkeypair -alias saml -keyalg RSA ...
            # In this demo we supply the literal PEM values inline so no external
            # keystore file is needed.
            signing:
              credentials:
                - private-key-location: "classpath:saml/sp-private-key.pem"
                  certificate-location: "classpath:saml/sp-certificate.pem"
            # Mock IdP metadata — in production this points to the real IdP metadata URL.
            assertingparty:
              metadata-uri: "classpath:saml/mock-idp-metadata.xml"
