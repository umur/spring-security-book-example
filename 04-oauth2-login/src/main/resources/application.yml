server:
  port: 8084

spring:
  application:
    name: oauth2-login-example
  datasource:
    url: jdbc:h2:mem:oauth2login
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          # Mock provider used in tests — real providers would go here
          mock-provider:
            client-id: mock-client-id
            client-secret: mock-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
            client-name: Mock Provider
        provider:
          mock-provider:
            authorization-uri: http://localhost:${wiremock.server.port:8090}/oauth2/authorize
            token-uri: http://localhost:${wiremock.server.port:8090}/oauth2/token
            user-info-uri: http://localhost:${wiremock.server.port:8090}/oauth2/userinfo
            jwk-set-uri: http://localhost:${wiremock.server.port:8090}/oauth2/jwks
            user-name-attribute: sub
