server:
  port: 8095

spring:
  application:
    name: acl-domain-security-example
  datasource:
    url: jdbc:h2:mem:acldb;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:acl-schema.sql
