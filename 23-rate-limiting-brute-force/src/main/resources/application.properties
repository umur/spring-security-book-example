spring.application.name=rate-limiting-brute-force
server.port=8103

# JPA / H2 (default — overridden in tests by Testcontainers)
spring.datasource.url=jdbc:h2:mem:ratelimitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Brute-force protection settings
app.security.max-attempts=5
app.security.lock-duration-seconds=900
