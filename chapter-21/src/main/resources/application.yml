spring:
  application:
    name: cinetrack-recommendation-reactive-multitenant

server:
  port: 8080

# Multi-tenant JWT issuers.
# The resource server does NOT use spring.security.oauth2.resourceserver.jwt.*
# here because issuer selection is handled programmatically in
# MultiTenantJwtDecoderConfig. In production each entry would point to the
# real authorization server's JWKS endpoint:
#
#   issuer1:
#     jwk-set-uri: https://auth1.cinetrack.io/.well-known/jwks.json
#   issuer2:
#     jwk-set-uri: https://auth2.cinetrack.io/.well-known/jwks.json
#
# The OAuth2 client registration below is used by ReactiveOAuth2ClientConfig
# for service-to-service catalog calls via client_credentials.

# spring:
#   security:
#     oauth2:
#       client:
#         registration:
#           catalog-service:
#             client-id: cinetrack-recommendation
#             client-secret: ${CATALOG_CLIENT_SECRET}
#             authorization-grant-type: client_credentials
#             scope: catalog:read
#         provider:
#           catalog-service:
#             token-uri: https://auth1.cinetrack.io/oauth2/token
