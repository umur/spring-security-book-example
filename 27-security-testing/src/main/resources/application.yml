server:
  port: 8107

spring:
  application:
    name: security-testing-example
  datasource:
    url: jdbc:h2:mem:securitytesting
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false
  # Disable OAuth2 resource server auto-config for tests unless a JWK URI is set.
  # The JWT decoder is configured programmatically in SecurityConfig only when
  # the property is present; in tests we use the .with(jwt()) post-processor.
  security:
    oauth2:
      resourceserver:
        jwt:
          # Dummy issuer — overridden in tests that need JWT; ignored when
          # the SecurityConfig creates a NimbusJwtDecoder directly.
          issuer-uri:
