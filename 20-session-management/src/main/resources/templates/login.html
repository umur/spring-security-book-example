<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login — Session Management</title>
</head>
<body>
<h1>Login</h1>
<div th:if="${param.error}">
    <p style="color:red">Invalid username or password.</p>
</div>
<div th:if="${param.logout}">
    <p style="color:green">You have been logged out.</p>
</div>
<div th:if="${param.expired}">
    <p style="color:orange">Your session has expired because you signed in elsewhere.</p>
</div>
<div th:if="${param.invalid}">
    <p style="color:orange">Invalid session. Please log in again.</p>
</div>
<form method="post" th:action="@{/login}">
    <div>
        <label>Username: <input type="text" name="username"/></label>
    </div>
    <div>
        <label>Password: <input type="password" name="password"/></label>
    </div>
    <button type="submit">Login</button>
</form>
</body>
</html>
