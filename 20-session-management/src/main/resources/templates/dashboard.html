<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard — Session Management</title>
</head>
<body>
<h1>Dashboard</h1>
<p>Welcome, <strong th:text="${username}">user</strong>!</p>
<h2>Session Information</h2>
<ul>
    <li>Session ID: <span th:text="${sessionId}">-</span></li>
    <li>Created: <span th:text="${creationTime}">-</span></li>
    <li>Max Inactive (s): <span th:text="${maxInactiveInterval}">-</span></li>
    <li>Roles: <span th:text="${authorities}">-</span></li>
</ul>
<form method="post" th:action="@{/logout}">
    <button type="submit">Logout</button>
</form>
</body>
</html>
