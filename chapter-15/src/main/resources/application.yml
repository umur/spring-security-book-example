spring:
  application:
    name: cinetrack-ch15
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-client-secret}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
