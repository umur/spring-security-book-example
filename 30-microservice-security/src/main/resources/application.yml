server:
  port: 8110

spring:
  application:
    name: microservice-security-example
  datasource:
    url: jdbc:h2:mem:microservice
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Overridden in tests via @DynamicPropertySource / WireMock
          jwk-set-uri: ${app.auth-server.jwk-set-uri:http://localhost:9000/oauth2/jwks}
      client:
        registration:
          external-service:
            provider: auth-server
            client-id: microservice-client
            client-secret: microservice-secret
            authorization-grant-type: client_credentials
            scope: internal.read
        provider:
          auth-server:
            token-uri: ${app.auth-server.token-uri:http://localhost:9000/oauth2/token}

app:
  auth-server:
    jwk-set-uri: http://localhost:9000/oauth2/jwks
    token-uri: http://localhost:9000/oauth2/token
  external-service:
    base-url: http://localhost:9001
    data-path: /api/external/data
