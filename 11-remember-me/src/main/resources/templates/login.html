<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="container">
    <h1>Login</h1>

    <div th:if="${param.error}" class="alert error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert success">You have been logged out.</div>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus required/>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required/>

        <div class="remember-me">
            <input type="checkbox" id="remember-me" name="remember-me"/>
            <label for="remember-me">Remember me for 14 days</label>
        </div>

        <button type="submit">Sign In</button>
    </form>

    <p class="hint">Default accounts: <code>admin/admin</code> or <code>user/user</code></p>
</div>
</body>
</html>
